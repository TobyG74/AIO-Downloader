name: aio_downloader
description: AIO Media Downloader - Download media from TikTok, YouTube, Instagram, and Facebook
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  html: ^0.15.4
  provider: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  gal: ^2.3.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.2.2
  video_player: ^2.8.1
  video_thumbnail: ^0.5.3
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  receive_sharing_intent: ^1.8.0
  font_awesome_flutter: ^10.7.0
  youtube_scrape_api: ^0.1.1
  package_info_plus: ^8.0.0
  flutter_inappwebview: ^6.1.5
  ffmpeg_kit_flutter_new_min: ^3.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icons.png"
  min_sdk_android: 21
  web:
    generate: false
flutter:
  uses-material-design: true
  generate: true


